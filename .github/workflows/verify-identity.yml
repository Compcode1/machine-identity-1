name: Verify AI Identity OIDC Federation
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test-data-plane:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Entra ID OIDC Federation Handshake
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Data Plane Asset Access Trigger
        run: |
          az keyvault secret show --vault-name "key-vault-sgt" --name "test-secret" --query value -o tsv
