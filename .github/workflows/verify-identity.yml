name: Verify AI Identity OIDC Federation
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test-data-plane:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Entra ID OIDC Federation Handshake
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Secure Data Plane Consumer
        run: |
          # 1. Fetch the raw payload silently from the Azure data plane into an internal memory variable
          RAW_PAYLOAD=$(az keyvault secret show --vault-name "key-vault-sgt" --name "test-secret" --query value -o tsv)
          
          # 2. Register the dynamic payload string with GitHub's log redaction filter engine
          echo "::add-mask::$RAW_PAYLOAD"
          
          # 3. Suppress raw standard output leaks and output a secure confirmation indicator instead
          echo "Token validation complete. Target payload has been consumed and masked securely."
